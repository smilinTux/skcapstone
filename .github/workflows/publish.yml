name: Publish to PyPI and npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v --ignore=tests/integration -k "not test_agent_card"
        continue-on-error: true

  publish-pypi:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag: $TAG_VERSION  Package: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml ($PKG_VERSION). Bump version before tagging."
            exit 1
          fi
      - run: pip install build twine
      - run: python -m build
      - run: twine upload --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sync version from pyproject.toml to package.json
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "npm version set to $TAG_VERSION"
      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
      - name: Build TypeScript
        run: npm run build 2>/dev/null || true
      - name: Publish to npm
        run: |
          OUTPUT=$(npm publish --access public 2>&1) && exit 0
          if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
            echo "::warning::Version already exists on npm — skipping"
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
