name: CI

# NOTE (coord 62c567cb): the old masked `test` job (pytest with `|| true`)
# was RETIRED from this workflow. The honest, required test check for main
# is .github/workflows/pytest.yml (job `unit`), which runs the full suite
# with all extras and NO masking. Configure branch protection to require
# the pytest.yml `unit` jobs, not anything in this file.
#
# This workflow keeps:
#   - lint: advisory only (job-level continue-on-error). It runs black and
#     ruff HONESTLY (no `|| true`), so failures show red on the job, but it
#     does not block merges yet. Pre-existing debt as of 2026-07-17:
#     ~1019 ruff errors, ~369 files needing black. Once the debt is paid,
#     remove continue-on-error to make lint blocking.
#   - build: wheel/sdist build + twine check (blocking).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    # Advisory while pre-existing lint debt is paid down. Failures are
    # visible (red job) but do not fail the workflow run.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: pip install black ruff
      - name: Check formatting
        run: black --check src/ tests/
      - name: Lint
        run: ruff check src/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build
      - name: Check dist
        run: |
          pip install twine
          twine check dist/*
