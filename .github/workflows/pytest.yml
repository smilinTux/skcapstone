name: pytest

# Honest unit-test CI for skcapstone.
#
# - Installs the package with ALL optional sovereign extras + dev tools so the
#   full test tree imports cleanly (capauth, sksecurity, skmemory[skvector],
#   skseed, skwhisper, skchat-sovereign, skcomms, fusepy, cloud SDKs).
#   See [project.optional-dependencies] in pyproject.toml.
# - Runs pytest on Python 3.11 and 3.12 (the supported runtime floor per
#   CLAUDE.md: "Python 3.11+").
# - Excludes integration / live (e2e) tests HONESTLY via pytest markers
#   (registered in [tool.pytest.ini_options]) using `-m "not integration and
#   not e2e"` plus `--strict-markers`. These tests need real services, network,
#   or an installed CLI / running daemon and cannot run on a clean runner.
#   Nothing here is masked with `|| true` — a real failure fails the job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # libfuse is needed for the fusepy optional extra (FUSE mount tests).
      - name: Install system deps (libfuse)
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev

      - name: Install package with all extras + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run unit tests (exclude integration + e2e via markers)
        run: |
          python -m pytest tests/ \
            --strict-markers \
            -m "not integration and not e2e" \
            --cov=skcapstone --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
