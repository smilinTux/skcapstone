# Weekly housekeeping safety-net job (default drop-in).
#
# Installed by skcapstone on a fresh init into
# ~/.skcapstone/config/jobs.d/housekeeping.yaml (idempotent — never
# overwrites an existing user file). Decoupled from the daemon: even if the
# hourly in-daemon housekeeping loop is not running, this weekly job reclaims
# disk and prevents the legacy/broadcast comms-outbox bloat that overheated a
# Framework 13 laptop (462k files; ~256k stale v1 "*" broadcast envelopes).
#
# Merged via the conf.d-style loader (load_jobs_with_dropins).
jobs:
  housekeeping:
    type: shell
    schedule: "0 4 * * 0"   # Sunday 04:00 — weekly safety net
    command: skcapstone housekeeping
    nodes: all
    timeout: 600
    enabled: true
